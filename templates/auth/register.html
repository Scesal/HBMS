{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block extra_css %}
<style>
  .auth-card { border-top: 4px solid var(--hbms-gold); }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
  <div class="col-sm-10 col-md-8 col-lg-6">
    <div class="card auth-card p-4">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill"
           style="font-size:2.5rem;color:var(--hbms-gold)"></i>
        <h4 class="mt-2" style="font-family:'Playfair Display',serif">
          Create Account
        </h4>
        <p class="text-muted small">Register as a Customer to start booking</p>
      </div>

      <form method="POST" action="{{ url_for('register') }}" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="full_name" class="form-control"
                   placeholder="John Doe" required autofocus>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control"
                   placeholder="you@example.com" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control"
                   placeholder="Min. 8 characters" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="confirm_password" class="form-control"
                   placeholder="Repeat password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-gold w-100 py-2">
          <i class="bi bi-check-circle me-2"></i>Register
        </button>
      </form>

      <hr class="my-3">
      <p class="text-center text-muted small mb-0">
        Already have an account?
        <a href="{{ url_for('login') }}" class="fw-semibold"
           style="color:var(--hbms-gold)">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
