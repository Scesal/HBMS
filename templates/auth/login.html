{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
  .auth-wrapper {
    min-height: calc(100vh - 160px);
    display: flex;
    align-items: center;
  }
  .auth-card {
    border-top: 4px solid var(--hbms-gold);
  }
  .auth-hero {
    background: var(--hbms-navy);
    border-radius: 12px;
    color: #fff;
    padding: 3rem 2rem;
  }
  .auth-hero h2 { font-family: 'Playfair Display', serif; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="row w-100 g-4 justify-content-center">

    <!-- Hero panel -->
    <div class="col-lg-5 d-none d-lg-flex align-items-center">
      <div class="auth-hero w-100 text-center">
        <i class="bi bi-building" style="font-size:4rem;color:var(--hbms-gold)"></i>
        <h2 class="mt-3">Welcome Back</h2>
        <p class="text-white-50 mt-2">
          Manage your stays, rooms, and reservations all in one place.
        </p>
      </div>
    </div>

    <!-- Login form -->
    <div class="col-sm-10 col-md-8 col-lg-5">
      <div class="card auth-card p-4">
        <h4 class="mb-1" style="font-family:'Playfair Display',serif">Sign In</h4>
        <p class="text-muted small mb-4">Enter your credentials to continue</p>

        <form method="POST" action="{{ url_for('login') }}" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control"
                     placeholder="you@example.com" required autofocus>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control"
                     placeholder="••••••••" required>
            </div>
          </div>

          <button type="submit" class="btn btn-gold w-100 py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>

        <hr class="my-3">
        <p class="text-center text-muted small mb-0">
          Don't have an account?
          <a href="{{ url_for('register') }}" class="fw-semibold"
             style="color:var(--hbms-gold)">Create one</a>
        </p>
      </div>
    </div>

  </div>
</div>
{% endblock %}
