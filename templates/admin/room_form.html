{% extends "base.html" %}
{% block title %}{{ action }} Room{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{{ url_for('admin_hotels') }}">Hotels</a></li>
    <li class="breadcrumb-item">
      <a href="{{ url_for('admin_rooms', hotel_id=hotel.hotel_id) }}">{{ hotel.name }}</a>
    </li>
    <li class="breadcrumb-item active">{{ action }} Room</li>
  </ol>
</nav>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header py-3">
        <h5 class="mb-0"><i class="bi bi-door-open me-2"></i>{{ action }} Room — {{ hotel.name }}</h5>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Room Number *</label>
              <input type="text" name="room_number" class="form-control"
                     value="{{ room.room_number if room else '' }}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Room Type *</label>
              <select name="room_type" class="form-select" required>
                {% for t in ['Single','Double','Suite','Deluxe'] %}
                  <option value="{{ t }}"
                    {{ 'selected' if room and room.room_type == t else '' }}>
                    {{ t }}
                  </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Max Occupancy</label>
              <input type="number" name="max_occupancy" class="form-control"
                     min="1" max="10"
                     value="{{ room.max_occupancy if room else 2 }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Price per Night (₹) *</label>
              <div class="input-group">
                <span class="input-group-text">₹</span>
                <input type="number" name="price_per_night" class="form-control"
                       min="1" step="0.01"
                       value="{{ room.price_per_night if room else '' }}" required>
              </div>
            </div>
            {% if room %}
            <div class="col-md-6">
              <label class="form-label fw-semibold">Availability</label>
              <select name="is_available" class="form-select">
                <option value="1" {{ 'selected' if room.is_available }}>Available</option>
                <option value="0" {{ 'selected' if not room.is_available }}>Occupied / Not Available</option>
              </select>
            </div>
            {% endif %}
            <div class="col-12">
              <label class="form-label fw-semibold">Amenities</label>
              <input type="text" name="amenities" class="form-control"
                     value="{{ room.amenities if room else '' }}"
                     placeholder="e.g. AC, Wi-Fi, TV, Mini-bar">
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-gold px-4">
              <i class="bi bi-check-lg me-1"></i>{{ action }} Room
            </button>
            <a href="{{ url_for('admin_rooms', hotel_id=hotel.hotel_id) }}"
               class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
